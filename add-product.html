<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<link rel="stylesheet"
      href="style.css">

</head>

<body>

<div class="background"></div>

<div class="login-container">

<div class="glass-card">

<h2>Add Product</h2>

<div class="form-group">

<input type="text"
       id="productName"
       placeholder="Product Name">

</div>

<div class="form-group">

<input type="number"
       id="productPrice"
       placeholder="Price">

</div>

<div class="form-group">

<input type="text"
       id="productCategory"
       placeholder="Category">

</div>

<button class="login-btn"
        onclick="addProduct()">

Save Product

</button>

</div>

</div>

<script type="module"
        src="firebase.js"></script>

</body>
</html>

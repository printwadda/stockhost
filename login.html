<!DOCTYPE html>
<html>
<head>

  <title>Admin Login</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="login-box">

  <h2>Admin Login</h2>

  <input type="email"
         id="email"
         placeholder="Email">

  <input type="password"
         id="password"
         placeholder="Password">

  <button onclick="login()">
      Login
  </button>

</div>

<script type="module"
        src="firebase.js"></script>

</body>
</html>

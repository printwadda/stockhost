<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet"
      href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

</head>

<body>

<div class="dashboard-bg"></div>

<div class="dashboard-container">

    <aside class="sidebar glass">

        <h2>ADMIN</h2>

        <ul>

            <li class="active">Dashboard</li>
            <li>Users</li>
            <li>Products</li>
            <li>Orders</li>
            <li>Analytics</li>
            <li>Settings</li>

        </ul>

        <button class="logout-btn"
                onclick="logout()">
            Logout
        </button>

    </aside>

    <main class="main-content">

          <div class="chart glass">

<h2>Products</h2>

<div id="productList"></div>

</div>

        <div class="topbar glass">

            <h1>Dashboard</h1>

            <input type="text"
                   placeholder="Search...">

        </div>

        <div class="cards">

            <div class="card glass">
                <h3>Total Users</h3>
                <p>database will be appear soon</p>
            </div>

            <div class="card glass">
                <h3>Total Orders</h3>
                <p>database will be appear soon</p>
            </div>

            <div class="card glass">
                <h3>Revenue</h3>
                <p>database will be appear soon</p>
            </div>

        </div>

        <div class="chart glass">

            <h2>Sales Overview</h2>

            <div class="fake-chart"></div>

        </div>

    </main>

</div>

<script type="module">

import {
  initializeApp
} from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  getAuth,
  signOut
} from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyBkz1iCqAugr8NoSbxrcrX5EWFoh4i36hk",

  authDomain:
  "stockhost-6daa0.firebaseapp.com",

  projectId: "stockhost-6daa0",

  storageBucket:
  "stockhost-6daa0.firebasestorage.app",

  messagingSenderId: "1097589064935",

  appId: "1:1097589064935:web:85b39b3cd52be003d28e42"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.logout = function(){

  signOut(auth)
  .then(() => {

      window.location =
        "login.html";

  });

}

</script>
      <script type="module"
        src="dashboard.js"></script>

</body>
</html>
